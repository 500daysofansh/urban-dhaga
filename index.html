    <!-- Preconnect to font origins so the connection is ready when CSS requests the font files -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Load Google Fonts with media="print" + onload swap trick.
      This makes the font request non-render-blocking:
      - Browser fetches it at low priority (print media)
      - onload flips media to "all" so fonts apply once downloaded
      - <noscript> fallback covers JS-disabled browsers
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=YOUR_FONT_HERE&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=YOUR_FONT_HERE&display=swap"
      />
    </noscript>
